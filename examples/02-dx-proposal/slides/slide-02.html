<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>Table of Contents Slide</title>
<style>
  :root {
    --brand-blue: #FF7E5F;
    --brand-deep: #E5573A;
    --brand-soft: #FFF1EC;
    --brand-blue: #FF7E5F;
    --white: #FFFFFF;
    --light-bg: #F8F8F8;
    --light-border: #E0E0E0;
    --black: #000000;
    --dark-gray: #333333;
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    width: 960px;
    height: 540px;
    font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: var(--white);
    overflow: hidden;
    position: relative;
  }
  .slide-header { padding: 32px 60px 0 60px; }
  .slide-header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }
  .slide-header-inner p {
    font-size: 13px;
    color: var(--dark-gray);
    font-weight: 500;
    line-height: 1.4;
  }
  .header-line {
    margin: 14px 60px 0 60px;
    height: 2px;
    background: var(--brand-blue);
  }
  .slide-body {
    display: flex;
    padding: 24px 60px 40px 60px;
    gap: 60px;
    height: calc(100% - 66px);
  }
  .left-section {
    display: flex;
    align-items: flex-start;
    padding-top: 10px;
    flex-shrink: 0;
  }
  .left-section h1 {
    font-size: 52px;
    font-weight: 800;
    color: var(--brand-deep);
    line-height: 1.05;
    letter-spacing: -0.025em;
  }
  .right-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
  }
  .toc-item {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 20px 0;
  }
  .toc-item .toc-number {
    font-size: 28px;
    font-weight: 800;
    color: var(--brand-blue);
    line-height: 1;
    flex-shrink: 0;
    width: 40px;
    letter-spacing: -0.02em;
  }
  .toc-item-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .toc-item-text h3 {
    font-size: 18px;
    font-weight: 600;
    color: var(--black);
    line-height: 1.3;
  }
  .toc-item-text p {
    font-size: 13px;
    color: var(--dark-gray);
    line-height: 1.5;
  }
  .toc-divider {
    width: 100%;
    height: 1px;
    background-color: var(--light-border);
  }
</style>
</head>
<body>
  <div class="slide-header">
    <div class="slide-header-inner">
      <p>Table of contents</p>
      <p>02</p>
    </div>
  </div>
  <div class="header-line"></div>
  <div class="slide-body">
    <div class="left-section">
      <h1>목차</h1>
    </div>
    <div class="right-section">
      
      <div class="toc-item">
        <p class="toc-number">01</p>
        <div class="toc-item-text">
          <h3>사업 배경 및 시장 현황</h3>
          <p>시장 성장 추이 · 주요 지표 변화</p>
        </div>
      </div>
      <div class="toc-divider"></div>
      

      <div class="toc-item">
        <p class="toc-number">02</p>
        <div class="toc-item-text">
          <h3>전략적 목표 및 핵심 가치</h3>
          <p>SWOT 분석 + 4 분면 대응 전략</p>
        </div>
      </div>
      <div class="toc-divider"></div>
      

      <div class="toc-item">
        <p class="toc-number">03</p>
        <div class="toc-item-text">
          <h3>세부 실행 방안 및 일정</h3>
          <p>16주 4 단계 마일스톤 로드맵</p>
        </div>
      </div>
      <div class="toc-divider"></div>
      

      <div class="toc-item">
        <p class="toc-number">04</p>
        <div class="toc-item-text">
          <h3>기대 효과 및 성과 관리</h3>
          <p>도입 전후 KPI 비교 + 정량 목표</p>
        </div>
      </div>
      <div class="toc-divider"></div>
      

      <div class="toc-item">
        <p class="toc-number">05</p>
        <div class="toc-item-text">
          <h3>운영 및 유지보수 계획</h3>
          <p>SLA 등급별 처리 기준</p>
        </div>
      </div>
      <div class="toc-divider"></div>
      
    </div>
  </div>
</body>
</html>
