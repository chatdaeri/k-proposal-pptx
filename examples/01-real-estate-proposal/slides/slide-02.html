<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="stylesheet" href="../../../skills/proposal/tokens/colors_and_type.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>Table of Contents Slide</title>
<style>
  :root {
    --brand-blue: #FF7E5F;
    --brand-deep: #E5573A;
    --brand-soft: #FFF1EC;
    --brand-blue: #FF7E5F;
    --white: #FFFFFF;
    --light-bg: #F8F8F8;
    --light-border: #E0E0E0;
    --black: #000000;
    --dark-gray: #333333;
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    width: 960px;
    height: 540px;
    font-family: var(--font-family);
    background-color: var(--white);
    overflow: hidden;
    position: relative;
  }
  .slide-header { padding: 32px 60px 0 60px; }
  .slide-header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }
  .slide-header-inner p {
    font-size: 13px;
    color: var(--dark-gray);
    font-weight: 500;
    line-height: 1.4;
  }
  .header-line {
    margin: 14px 60px 0 60px;
    height: 2px;
    background: var(--brand-blue);
  }
  .slide-body {
    display: flex;
    padding: 24px 60px 40px 60px;
    gap: 60px;
    height: calc(100% - 66px);
  }
  .left-section {
    display: flex;
    align-items: flex-start;
    padding-top: 10px;
    flex-shrink: 0;
  }
  .left-section h1 {
    font-size: 52px;
    font-weight: 800;
    color: var(--brand-deep);
    line-height: 1.05;
    letter-spacing: -0.025em;
  }
  .right-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
  }
  .toc-item {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 20px 0;
  }
  .toc-item .toc-number {
    font-size: 28px;
    font-weight: 800;
    color: var(--brand-blue);
    line-height: 1;
    flex-shrink: 0;
    width: 40px;
    letter-spacing: -0.02em;
  }
  .toc-item-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .toc-item-text h3 {
    font-size: 18px;
    font-weight: 600;
    color: var(--black);
    line-height: 1.3;
  }
  .toc-item-text p {
    font-size: 13px;
    color: var(--dark-gray);
    line-height: 1.5;
  }
  .toc-divider {
    width: 100%;
    height: 1px;
    background-color: var(--light-border);
  }
</style>
</head>
<body>
  <div class="slide-header">
    <div class="slide-header-inner">
      <p>Table of contents</p>
      <p>02</p>
    </div>
  </div>
  <div class="header-line"></div>
  <div class="slide-body">
    <div class="left-section">
      <h1>목차</h1>
    </div>
    <div class="right-section">
      
      <div class="toc-item">
        <p class="toc-number">01</p>
        <div class="toc-item-text">
          <h3>입지 현황 및 시장 환경</h3>
          <p>역세권 접근성 · 인구 추이 · 개발 호재</p>
        </div>
      </div>
      <div class="toc-divider"></div>
      

      <div class="toc-item">
        <p class="toc-number">02</p>
        <div class="toc-item-text">
          <h3>경쟁 단지 분석</h3>
          <p>반경 1km 내 3개 단지 비교</p>
        </div>
      </div>
      <div class="toc-divider"></div>
      

      <div class="toc-item">
        <p class="toc-number">03</p>
        <div class="toc-item-text">
          <h3>평형 구성 제안</h3>
          <p>수요층 분석 기반 59/74/84형 믹스</p>
        </div>
      </div>
      <div class="toc-divider"></div>
      

      <div class="toc-item">
        <p class="toc-number">04</p>
        <div class="toc-item-text">
          <h3>수익성 분석</h3>
          <p>현행 토지 vs 개발 후 NPV 비교</p>
        </div>
      </div>
      <div class="toc-divider"></div>
      

      <div class="toc-item">
        <p class="toc-number">05</p>
        <div class="toc-item-text">
          <h3>분양가 산정 및 사업비</h3>
          <p>인근 실거래 기반 분양가 + 사업비 구조</p>
        </div>
      </div>
      <div class="toc-divider"></div>
      
    </div>
  </div>
</body>
</html>
