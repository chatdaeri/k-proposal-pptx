<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>Cover Slide</title>
<style>
  :root {
    --brand-blue: #FF7E5F;
    --brand-deep: #E5573A;
    --brand-blue: #FF7E5F; /* legacy alias */
    --white: #FFFFFF;
    --light-bg: #F8F8F8;
    --black: #000000;
    --dark-gray: #333333;
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    width: 960px;
    height: 540px;
    font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: var(--white);
    overflow: hidden;
    position: relative;
  }
  .slide-container {
    width: 100%;
    height: 100%;
    padding: 40px 60px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top-bar {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .top-bar p {
    font-size: 14px;
    color: var(--dark-gray);
    letter-spacing: 0.5px;
  }
  .top-bar .company-name {
    font-weight: 700;
    color: var(--black);
  }
  .top-bar .separator {
    color: var(--brand-blue);
  }
  .center-content {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .center-content .subtitle {
    font-size: 14px;
    font-weight: 500;
    color: var(--dark-gray);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .center-content .hero-title {
    font-size: 56px;
    font-weight: 800;
    color: var(--brand-deep);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .bottom-bar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .contact-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .contact-info .label {
    font-size: 13px;
    font-weight: 600;
    color: var(--dark-gray);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .contact-info .detail {
    font-size: 13px;
    color: var(--black);
    font-weight: 400;
  }
  .logo-area img {
    height: 36px;
    width: auto;
  }
</style>
</head>
<body>
  <div class="slide-container">
    <div class="top-bar">
      <img src="../assets/chatdaeri-logo.png" alt="CHATdaeri" style="height:18px;width:auto;display:block">
      <p class="separator">|</p>
      <p>Presentation</p>
      <p class="separator">|</p>
      <p>bluelaps.com</p>
    </div>
    <div class="center-content">
      <p class="subtitle">REAL ESTATE FEASIBILITY STUDY · 2026.04</p>
      <h1 class="hero-title">S시 K동 123번지<br>신축 오피스텔<br>분양성 검토 보고서</h1>
    </div>
    <div class="bottom-bar">
      <div class="contact-info">
        <p class="label">제출처</p>
        <p class="detail">GreenDev Co. 개발사업팀</p>
      </div>
      <div class="logo-area">
        <img src="" alt="CHATdaeri">
      </div>
    </div>
  </div>
</body>
</html>
