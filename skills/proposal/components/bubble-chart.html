<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>Bubble Chart Slide</title>
<!--
  USAGE:
  세그먼트 매핑용 버블 차트 슬라이드. 두 축 + 버블 크기로 3차원 데이터 시각화.
  "시장 분석", "포지셔닝 맵", "고객 세그먼트" 등 사용.

  구조:
  - 헤더 + 타이틀 블록
  - 좌: SVG 버블 차트 (X=Low/Mid/High, Y=Low/Mid/High, 버블 크기=값)
  - 우: 세그먼트 범례 + 크기 범례 + 핵심 인사이트 박스

  REPLACE:
  - SVG circle 좌표/반지름/라벨 직접 수정
-->
<link rel="stylesheet" href="../primitives/_shared.css">
<style>
  .slide-body { padding: 18px 60px 0; }
  .ttl-block { padding: 8px 0 6px; }
  .section-label { font-size: 13px; font-weight: 600; color: var(--brand-blue); letter-spacing: .06em; margin: 0 0 4px; }
  .main-title { font-size: 26px; font-weight: 800; color: var(--black); line-height: 1.2; margin: 0 0 4px; letter-spacing: -.01em; }
  .lede { font-size: 13px; color: var(--label-gray); line-height: 1.5; margin: 0; }

  .chart-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 22px; margin-top: 6px; }
  .chart-col { display: flex; flex-direction: column; gap: 6px; }
  .axis-cap { font-size: 11.5px; color: var(--mid-gray); font-family: ui-monospace, Menlo, monospace; }
  .legend-row { display: grid; grid-template-columns: 1.6fr 1fr; border: 1px solid var(--light-border); }
  .legend-col { padding: 9px 11px; }
  .legend-col + .legend-col { border-left: 1px solid var(--light-border); }
  .legend-col h4 { font-size: 10.5px; font-weight: 700; color: var(--mid-gray); letter-spacing: .08em; font-family: ui-monospace, Menlo, monospace; margin: 0 0 7px; text-transform: uppercase; }
  .legend-list { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--label-gray); white-space: nowrap; }
  .legend-item strong { color: var(--black); font-weight: 700; }
  .dot { display: inline-block; border-radius: 50%; flex-shrink: 0; }
  .dot.brand { background: var(--brand-blue); }
  .dot.deep { background: var(--brand-deep); }
  .dot.gray { background: var(--mid-gray); }
  .size-legend { display: flex; align-items: flex-end; gap: 12px; }
  .size-legend .ring { border: 1.5px solid var(--brand-blue); border-radius: 50%; }
  .size-legend p { margin: 0; font-size: 10.5px; color: var(--mid-gray); font-family: ui-monospace, Menlo, monospace; }
  .size-legend > div { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .insight { background: var(--brand-tint-solid); border-left: 4px solid var(--brand-blue); padding: 11px 14px; margin-top: 10px; }
  .insight .label { font-size: 10.5px; font-weight: 800; color: var(--brand-blue); letter-spacing: .1em; font-family: ui-monospace, Menlo, monospace; text-transform: uppercase; }
  .insight .body-text { font-size: 13px; color: var(--black); line-height: 1.5; margin: 5px 0 0; font-weight: 600; letter-spacing: -.005em; }
  .insight .body-text strong { color: var(--brand-blue); font-weight: 800; }
</style>
</head>
<body>
  <div class="slide-header">
    <div class="slide-header-inner">
      <p>{{SECTION_TITLE}}</p>
      <p>{{PAGE_NUMBER}}</p>
    </div>
    <div class="header-line"></div>
  </div>
  <div class="slide-body">
    <div class="ttl-block">
      <p class="section-label">{{LABEL}}</p>
      <h1 class="main-title">{{TITLE}}</h1>
      <p class="lede">{{LEDE}}</p>
    </div>
    <div class="chart-row">
      <div class="chart-col">
        <div style="display:flex;justify-content:space-between"><p class="axis-cap" style="margin:0;display:inline-block">{{Y_AXIS}}</p><p class="axis-cap" style="margin:0;display:inline-block">크기 = {{SIZE_DIM}}</p></div>
        <div data-pptx-image="true" style="width:100%;height:240px;background:var(--white)">
        <svg viewBox="0 0 480 320" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%;display:block;border:1px solid #E0E0E0">
          <g stroke="var(--light-border)" stroke-width="1">
            <line x1="40" y1="40" x2="470" y2="40"/>
            <line x1="40" y1="120" x2="470" y2="120"/>
            <line x1="40" y1="200" x2="470" y2="200"/>
            <line x1="40" y1="270" x2="470" y2="270"/>
          </g>
          <line x1="40" y1="290" x2="470" y2="290" stroke="var(--black)" stroke-width="1"/>
          <line x1="40" y1="40" x2="40" y2="290" stroke="var(--black)" stroke-width="1"/>
          <g font-size="10" fill="var(--mid-gray)" font-family="ui-monospace,Menlo,monospace">
            <text x="34" y="44" text-anchor="end">High</text>
            <text x="34" y="200" text-anchor="end">Mid</text>
            <text x="34" y="294" text-anchor="end">Low</text>
          </g>
          <g font-size="10" fill="var(--mid-gray)" font-family="ui-monospace,Menlo,monospace" text-anchor="middle">
            <text x="120" y="308">Low</text>
            <text x="255" y="308">Mid</text>
            <text x="430" y="308">High</text>
          </g>
          <g>
            <circle cx="120" cy="240" r="24" fill="var(--brand-orange)" fill-opacity=".85"/>
            <text x="120" y="244" text-anchor="middle" font-size="11" font-weight="700" fill="var(--white)">A</text>
            <circle cx="210" cy="170" r="36" fill="var(--brand-deep)" fill-opacity=".85"/>
            <text x="210" y="174" text-anchor="middle" font-size="13" font-weight="700" fill="var(--white)">B</text>
            <circle cx="320" cy="115" r="50" fill="var(--brand-orange)" fill-opacity=".85"/>
            <text x="320" y="120" text-anchor="middle" font-size="15" font-weight="800" fill="var(--white)">C</text>
            <circle cx="395" cy="225" r="20" fill="var(--mid-gray)"/>
            <text x="395" y="230" text-anchor="middle" font-size="11" font-weight="700" fill="var(--dark-gray)">D</text>
            <circle cx="425" cy="75" r="29" fill="var(--brand-orange)" fill-opacity=".6"/>
            <text x="425" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="var(--white)">E</text>
          </g>
        </svg>
        </div>
        <div style="display:flex;justify-content:flex-end"><p class="axis-cap" style="margin:0;display:inline-block">{{X_AXIS}} →</p></div>
      </div>
      <div class="chart-col">
        <div class="legend-row">
          <div class="legend-col">
            <h4>세그먼트</h4>
            <div class="legend-list">
              <div class="legend-item"><span class="dot brand" style="width:9px;height:9px"></span><strong>A</strong>&nbsp;{{SEG_A}}</div>
              <div class="legend-item"><span class="dot deep" style="width:11px;height:11px"></span><strong>B</strong>&nbsp;{{SEG_B}}</div>
              <div class="legend-item"><span class="dot brand" style="width:13px;height:13px"></span><strong>C</strong>&nbsp;{{SEG_C}}</div>
              <div class="legend-item"><span class="dot gray" style="width:8px;height:8px"></span><strong>D</strong>&nbsp;{{SEG_D}}</div>
              <div class="legend-item"><span class="dot brand" style="width:10px;height:10px;opacity:.6"></span><strong>E</strong>&nbsp;{{SEG_E}}</div>
            </div>
          </div>
          <div class="legend-col">
            <h4>크기</h4>
            <div class="size-legend">
              <div><div class="ring" style="width:10px;height:10px"></div><p>10</p></div>
              <div><div class="ring" style="width:18px;height:18px"></div><p>50</p></div>
              <div><div class="ring" style="width:26px;height:26px"></div><p>120</p></div>
            </div>
          </div>
        </div>
        <div class="insight">
          <p class="label" style="margin:0;display:inline-block">핵심 인사이트</p>
          <p class="body-text">{{INSIGHT}}</p>
        </div>
      </div>
    </div>
  </div>
  <div class="logo-area">
    <img src="../assets/logo.png" alt="CHATdaeri" style="height:18px;width:auto;display:block">
  </div>
</body>
</html>
