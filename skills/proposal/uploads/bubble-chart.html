<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>Bubble Chart</title>
<!--
  USAGE:
  X·Y 축 + 버블 크기(=세 번째 변수)로 시장 포지션 / 세그먼트 / 우선순위 표현.
  헤더 + 본문 메시지 + 좌측 SVG 버블차트 + 우측 범례·해석.
  CHATdaeri 팔레트 (브랜드 블루·딥 네이비·소프트 블루·그레이 톤만) 사용.

  REPLACE:
  - {{HEADER_LEFT}} / {{PAGE_NUMBER}}
  - {{SECTION_LABEL}} / {{TITLE}} / {{LEDE}}
  - {{X_AXIS_LABEL}} / {{Y_AXIS_LABEL}} / {{SIZE_LEGEND}}
  - 버블 데이터: <circle> + 라벨을 SVG 안에서 직접 편집
  - 우측 .insight 박스: 해석 한 문단
-->
<style>
@import url('./_shared.css');

.body-area { position: absolute; top: 96px; left: var(--pad-x); right: var(--pad-x); bottom: 50px; }
.section-label { font-size: 12px; font-weight: 600; color: var(--brand-blue); letter-spacing: 0.06em; margin: 0 0 4px; }
.ph1 { font-size: 24px; font-weight: 800; color: var(--black); line-height: 1.25; margin: 0 0 6px; letter-spacing: -0.01em; }
.ph1 .a { color: var(--brand-blue); }
.lede { font-size: 14px; font-weight: 500; color: var(--label-gray); line-height: 1.45; margin: 0; }

.chart-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 22px; margin-top: 14px; height: 320px; }
.chart-col { display: flex; flex-direction: column; gap: 6px; }
.axis-cap { font-size: 10.5px; color: var(--mid-gray); font-family: ui-monospace, Menlo, monospace; }

/* 범례 행 — 세그먼트 / 크기 2-칼럼 한 줄 */
.legend-row { display: grid; grid-template-columns: 1.6fr 1fr; border: 1px solid var(--light-border); }
.legend-row .legend-col { padding: 8px 10px; }
.legend-row .legend-col + .legend-col { border-left: 1px solid var(--light-border); }
.legend-row h4 { font-size: 10px; font-weight: 700; color: var(--mid-gray); letter-spacing: 0.08em; font-family: ui-monospace, Menlo, monospace; margin: 0 0 6px; text-transform: uppercase; }
.legend-list { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 8px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 10.5px; color: var(--label-gray); white-space: nowrap; }
.legend-item strong { color: var(--black); font-weight: 700; }
.dot { display: inline-block; border-radius: 50%; flex-shrink: 0; }
.dot.brand { background: var(--brand-blue); }
.dot.deep  { background: #E5573A; }
.dot.gray  { background: #C8C8C8; }

.size-legend { display: flex; align-items: flex-end; gap: 10px; }
.size-legend .ring { border: 1.5px solid var(--brand-blue); border-radius: 50%; }
.size-legend p { margin: 0; font-size: 10px; color: var(--mid-gray); font-family: ui-monospace, Menlo, monospace; }
.size-legend > div { display: flex; flex-direction: column; align-items: center; gap: 3px; }

/* 핵심 — 크게 강조 */
.insight { background: var(--brand-soft); border-left: 4px solid var(--brand-blue); padding: 16px 18px; margin-top: 12px; }
.insight .label { font-size: 10px; font-weight: 800; color: var(--brand-blue); letter-spacing: 0.1em; font-family: ui-monospace, Menlo, monospace; text-transform: uppercase; }
.insight .body-text { font-size: 14.5px; color: var(--black); line-height: 1.5; margin-top: 6px; font-weight: 600; letter-spacing: -0.005em; }
.insight .body-text strong { color: var(--brand-blue); font-weight: 800; }

.logo { position: absolute; bottom: 20px; right: var(--pad-x); height: 14px; }
.logo span { font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 800; letter-spacing: -0.035em; color: var(--brand-blue); font-size: 14px; }
</style>
</head>
<body>
  <div class="slide-header">
    <div class="slide-header-inner"><p>{{HEADER_LEFT}}</p><p>{{PAGE_NUMBER}}</p></div>
    <div class="header-line"></div>
  </div>
  <div class="body-area">
    <p class="section-label">{{SECTION_LABEL}}</p>
    <h1 class="ph1">{{TITLE}}</h1>
    <p class="lede">{{LEDE}}</p>

    <div class="chart-row">
      <div class="chart-col">
        <div style="display:flex;justify-content:space-between;align-items:center"><span class="axis-cap">{{Y_AXIS_LABEL}}</span><span class="axis-cap">{{SIZE_LEGEND}}</span></div>
        <svg viewBox="0 0 560 300" preserveAspectRatio="xMidYMid meet" style="width:100%;height:300px;display:block;border:1px solid var(--light-border)">
          <!-- gridlines -->
          <g stroke="#F0F0F0" stroke-width="1">
            <line x1="50" y1="40"  x2="540" y2="40"/>
            <line x1="50" y1="100" x2="540" y2="100"/>
            <line x1="50" y1="160" x2="540" y2="160"/>
            <line x1="50" y1="220" x2="540" y2="220"/>
          </g>
          <!-- axes -->
          <line x1="50" y1="260" x2="540" y2="260" stroke="#000" stroke-width="1"/>
          <line x1="50" y1="40"  x2="50"  y2="260" stroke="#000" stroke-width="1"/>
          <!-- y axis labels -->
          <g font-size="9.5" fill="#676765" font-family="ui-monospace,Menlo,monospace">
            <text x="44" y="44"  text-anchor="end">High</text>
            <text x="44" y="164" text-anchor="end">Mid</text>
            <text x="44" y="264" text-anchor="end">Low</text>
          </g>
          <!-- x axis labels -->
          <g font-size="9.5" fill="#676765" font-family="ui-monospace,Menlo,monospace" text-anchor="middle">
            <text x="120" y="278">Low</text>
            <text x="295" y="278">Mid</text>
            <text x="490" y="278">High</text>
          </g>
          <!-- bubbles (replace cx/cy/r/fill 와 라벨) -->
          <g>
            <circle cx="140" cy="210" r="22" fill="#FF7E5F" fill-opacity="0.85"/>
            <text x="140" y="214" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF" font-family="Pretendard Variable">A</text>

            <circle cx="240" cy="150" r="34" fill="#E5573A" fill-opacity="0.85"/>
            <text x="240" y="154" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF" font-family="Pretendard Variable">B</text>

            <circle cx="370" cy="100" r="48" fill="#FF7E5F" fill-opacity="0.85"/>
            <text x="370" y="104" text-anchor="middle" font-size="13" font-weight="800" fill="#FFF" font-family="Pretendard Variable">C</text>

            <circle cx="450" cy="200" r="18" fill="#C8C8C8"/>
            <text x="450" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#333" font-family="Pretendard Variable">D</text>

            <circle cx="490" cy="65"  r="28" fill="#FF7E5F" fill-opacity="0.6"/>
            <text x="490" y="69"  text-anchor="middle" font-size="11" font-weight="700" fill="#FFF" font-family="Pretendard Variable">E</text>
          </g>
        </svg>
        <div style="display:flex;justify-content:flex-end"><span class="axis-cap">{{X_AXIS_LABEL}} →</span></div>
      </div>

      <div class="chart-col">
        <div class="legend-row">
          <div class="legend-col">
            <h4>세그먼트</h4>
            <div class="legend-list">
              <div class="legend-item"><span class="dot brand" style="width:9px;height:9px"></span><strong>A</strong>&nbsp;신규 진입군</div>
              <div class="legend-item"><span class="dot deep"  style="width:11px;height:11px"></span><strong>B</strong>&nbsp;성장 코어</div>
              <div class="legend-item"><span class="dot brand" style="width:13px;height:13px"></span><strong>C</strong>&nbsp;프리미엄 리더</div>
              <div class="legend-item"><span class="dot gray"  style="width:8px;height:8px"></span><strong>D</strong>&nbsp;관망 그룹</div>
              <div class="legend-item"><span class="dot brand" style="width:10px;height:10px;opacity:0.6"></span><strong>E</strong>&nbsp;고잠재 신흥</div>
            </div>
          </div>
          <div class="legend-col">
            <h4>크기</h4>
            <div class="size-legend">
              <div><div class="ring" style="width:10px;height:10px"></div><p>10K</p></div>
              <div><div class="ring" style="width:18px;height:18px"></div><p>50K</p></div>
              <div><div class="ring" style="width:28px;height:28px"></div><p>120K</p></div>
            </div>
          </div>
        </div>

        <div class="insight">
          <span class="label">핵심 인사이트</span>
          <p class="body-text">우상단(고매력·고경쟁력)에 위치한 <strong>C 프리미엄 리더</strong>가 다음 분기 핵심 투자처. {{INSIGHT_TAIL}}</p>
        </div>
      </div>
    </div>
  </div>
  <div class="logo"><span>CHATdaeri</span></div>
</body>
</html>
