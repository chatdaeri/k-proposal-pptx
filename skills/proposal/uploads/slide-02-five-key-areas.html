<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2030 K-배터리 5대 전략 영역</title>
<style>
  :root {
    --brand-orange: #FF7E5F;
    --white: #FFFFFF;
    --light-bg: #F8F8F8;
    --black: #000000;
    --dark-gray: #333333;
    --mid-gray: #676765;
    --label-gray: #4A4A48;
    --light-border: #E0E0E0;
    --pad-x: 80px;
    --pad-top: 42px;
    --header-total: 88px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px;
    font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--white); color: var(--dark-gray);
    position: relative; overflow: hidden;
  }

  /* 헤더 */
  .slide-header { padding: var(--pad-top) var(--pad-x) 0 var(--pad-x); }
  .slide-header-inner { display: flex; justify-content: space-between; align-items: center; }
  .slide-header-inner p { font-size: 14px; font-weight: 500; color: var(--dark-gray); line-height: 1.4; }
  .header-line { height: 2px; background: var(--brand-orange); margin-top: 16px; }

  /* 본문 */
  .main {
    height: calc(100% - var(--header-total));
    padding: 30px var(--pad-x) 60px var(--pad-x);
    display: flex; flex-direction: column;
  }
  .main-title { font-size: 30px; font-weight: 700; color: var(--black); line-height: 1.2; }
  .main-sub { font-size: 14px; color: var(--mid-gray); line-height: 1.5; margin-top: 8px; }

  /* 5대 영역 리스트 */
  .areas {
    margin-top: 40px;
    display: flex; flex-direction: column;
    border-top: 1px solid var(--light-border);
  }
  .area {
    display: grid;
    grid-template-columns: 60px 280px 60px 1fr;
    align-items: center;
    gap: 18px;
    padding: 22px 18px;
    border-bottom: 1px solid var(--light-border);
  }
  .area:nth-child(odd) { background: var(--light-bg); }
  .area:nth-child(even) { background: var(--white); }

  .area-num {
    font-size: 24px; font-weight: 700;
    color: var(--brand-orange);
    line-height: 1;
  }
  .area-pill {
    background: var(--brand-orange);
    color: var(--white);
    font-size: 14px; font-weight: 700;
    padding: 10px 16px;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .arrow {
    color: var(--brand-orange);
    font-size: 20px;
    text-align: center;
    font-weight: 700;
  }
  .area-desc {
    font-size: 16px;
    color: var(--black);
    font-weight: 500;
    line-height: 1.4;
  }
  .area-desc strong {
    color: var(--brand-orange);
    font-weight: 700;
  }

  /* 푸터 */
  .footer-meta {
    position: absolute;
    bottom: 22px; left: var(--pad-x);
    font-size: 11px; color: var(--mid-gray);
  }
  .logo-area {
    position: absolute;
    bottom: 22px; right: var(--pad-x);
    height: 14px;
  }
  .logo-area img { height: 100%; width: auto; display: block; opacity: 0.85; }
</style>
</head>
<body>
  <!-- 헤더 -->
  <div class="slide-header">
    <div class="slide-header-inner">
      <p>K-배터리 진출 전략</p>
      <p>02</p>
    </div>
    <div class="header-line"></div>
  </div>

  <!-- 메인 -->
  <div class="main">
    <h1 class="main-title">2030 K-배터리 5대 전략 영역</h1>
    <p class="main-sub">단기 12개월 내 의사결정이 필요한 우선순위 영역</p>

    <div class="areas">
      <div class="area">
        <span class="area-num">01</span>
        <div class="area-pill">제품 포트폴리오</div>
        <span class="arrow">▶</span>
        <p class="area-desc"><strong>NCM 고에너지</strong> + <strong>LFP 가성비</strong> 동시 운영</p>
      </div>
      <div class="area">
        <span class="area-num">02</span>
        <div class="area-pill">원소재 공급망</div>
        <span class="arrow">▶</span>
        <p class="area-desc">리튬·니켈 장기계약 + 재활용 비중 <strong>25%</strong></p>
      </div>
      <div class="area">
        <span class="area-num">03</span>
        <div class="area-pill">거점 전략</div>
        <span class="arrow">▶</span>
        <p class="area-desc">북미 <strong>IRA</strong> / 유럽 <strong>CRMA</strong> / ASEAN 통합거점</p>
      </div>
      <div class="area">
        <span class="area-num">04</span>
        <div class="area-pill">차세대 R&amp;D</div>
        <span class="arrow">▶</span>
        <p class="area-desc">전고체 · 46파이 · 건식 전극 <strong>30년 양산</strong></p>
      </div>
      <div class="area">
        <span class="area-num">05</span>
        <div class="area-pill">조직 · 역량</div>
        <span class="arrow">▶</span>
        <p class="area-desc">현지 인력 + 재교육 + <strong>ESG 거버넌스</strong></p>
      </div>
    </div>
  </div>

  <!-- 푸터 -->
  <div class="footer-meta">Source: 사내 전략 TF 보고서 (2026)</div>
  <div class="logo-area"><img src="logo.png" alt="CHATdaeri"></div>
</body>
</html>
