<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>Content — 3 Image Strip</title>
<!--
  USAGE:
  3개 이미지를 가로 스트립으로 나열. 도구 3개 병렬 소개, 단계 3개, 사례 3개 등.
  이미지 비율: 1:1 고정 (혼합 금지)
  한 카드를 크게 / 나머지를 작게 하는 리듬은 이 템플릿에서는 지원하지 않음
  (3개 균등이 더 자연스러우므로). 리듬이 필요하면 anchored-left/right 사용.

  REPLACE:
  - {{SECTION_TITLE}}, {{PAGE_NUMBER}}
  - {{MAIN_TITLE}}, {{MAIN_SUB}}
  - {{CARD_N_IMG_DESC}}, {{CARD_N_TITLE}}, {{CARD_N_BODY}}
-->
<link rel="stylesheet" href="../primitives/_shared.css">
<style>
.main {
  padding: 22px var(--pad-x) 0 var(--pad-x);
  display: flex;
  flex-direction: column;
  gap: 14px;
  height: calc(100% - var(--header-total));
}
.title-row { display: flex; flex-direction: column; gap: 4px; }
.cards {
  display: flex;
  gap: 20px;
  flex: 1;
  min-height: 0;
}
.card {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
}
.card .img-wrap {
  width: 100%;
  max-width: 220px;
}
.card .text-block {
  padding-top: 6px;
  border-top: 2px solid var(--brand-blue);
}
.card h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--brand-blue);
  margin-bottom: 3px;
  line-height: 1.3;
}
.card p.body {
  font-size: 12px;
  color: var(--dark-gray);
  line-height: 1.55;
}
.card .num {
  font-size: 9px;
  font-weight: 600;
  color: var(--mid-gray);
  letter-spacing: 1px;
}
</style>
</head>
<body>
  <div class="slide-header">
    <div class="slide-header-inner">
      <p>{{SECTION_TITLE}}</p>
      <p>{{PAGE_NUMBER}}</p>
    </div>
    <div class="header-line"></div>
  </div>

  <div class="main">
    <div class="title-row">
      <h1 class="main-title">{{MAIN_TITLE}}</h1>
      <p class="main-sub">{{MAIN_SUB}}</p>
    </div>

    <div class="cards">
      <div class="card">
        <div class="img-wrap">
          <div class="img-slot" data-ratio="1-1">
            <div class="img-slot-inner">
              <p>IMAGE<br>{{CARD_1_IMG_DESC}}</p>
            </div>
          </div>
        </div>
        <div class="text-block">
          <p class="num">01</p>
          <h3>{{CARD_1_TITLE}}</h3>
          <p class="body">{{CARD_1_BODY}}</p>
        </div>
      </div>

      <div class="card">
        <div class="img-wrap">
          <div class="img-slot" data-ratio="1-1">
            <div class="img-slot-inner">
              <p>IMAGE<br>{{CARD_2_IMG_DESC}}</p>
            </div>
          </div>
        </div>
        <div class="text-block">
          <p class="num">02</p>
          <h3>{{CARD_2_TITLE}}</h3>
          <p class="body">{{CARD_2_BODY}}</p>
        </div>
      </div>

      <div class="card">
        <div class="img-wrap">
          <div class="img-slot" data-ratio="1-1">
            <div class="img-slot-inner">
              <p>IMAGE<br>{{CARD_3_IMG_DESC}}</p>
            </div>
          </div>
        </div>
        <div class="text-block">
          <p class="num">03</p>
          <h3>{{CARD_3_TITLE}}</h3>
          <p class="body">{{CARD_3_BODY}}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="logo-area">
    <img src="../assets/chatdaeri-logo.png" alt="CHATdaeri" style="height:18px;width:auto;display:block">
  </div>
</body>
</html>
