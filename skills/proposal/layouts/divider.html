<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>Divider Slide</title>
<link rel="stylesheet" href="../_shared.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    width: 960px;
    height: 540px;
    font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: var(--white);
    overflow: hidden;
    position: relative;
  }
  .slide-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .section-badge {
    width: 64px;
    height: 64px;
    background-color: var(--brand-deep);
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .section-badge p {
    font-size: 28px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.02em;
  }
  .section-title {
    text-align: center;
  }
  .section-title h1 {
    font-size: 44px;
    font-weight: 800;
    color: var(--brand-deep);
    line-height: 1.15;
    letter-spacing: -0.02em;
  }
  .section-subtitle {
    text-align: center;
  }
  .section-subtitle p {
    font-size: 16px;
    font-weight: 400;
    color: var(--dark-gray);
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="slide-container">
    <div class="section-badge">
      <p>{{SECTION_NUMBER}}</p>
    </div>
    <div class="section-title">
      <h1>{{SECTION_TITLE}}</h1>
    </div>
    <div class="section-subtitle">
      <p>{{SECTION_SUBTITLE}}</p>
    </div>
  </div>
</body>
</html>
