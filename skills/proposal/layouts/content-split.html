<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>Content Split Slide</title>
<style>
  :root {
    --brand-blue: #FF7E5F;
    --white: #FFFFFF;
    --light-bg: #F8F8F8;
    --black: #000000;
    --dark-gray: #333333;
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    width: 960px;
    height: 540px;
    font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: var(--white);
    overflow: hidden;
    position: relative;
  }
  .slide-header { padding: 32px 60px 0 60px; }
  .slide-header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }
  .slide-header-inner p {
    font-size: 13px;
    color: var(--dark-gray);
    font-weight: 500;
    line-height: 1.4;
  }
  .header-line {
    margin: 14px 60px 0 60px;
    height: 2px;
    background: var(--brand-blue);
  }
  .slide-body {
    display: flex;
    padding: 24px 60px 40px 60px;
    gap: 0;
    height: calc(100% - 66px);
  }
  .left-panel {
    width: 340px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-right: 40px;
  }
  .left-panel h2 {
    font-size: 36px;
    font-weight: 700;
    color: var(--black);
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .left-panel p {
    font-size: 14px;
    color: var(--dark-gray);
    line-height: 1.6;
  }
  .vertical-divider {
    width: 2px;
    background-color: var(--black);
    flex-shrink: 0;
    align-self: stretch;
  }
  .right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 40px;
    gap: 20px;
  }
  .right-panel .intro-text {
    font-size: 13px;
    color: var(--dark-gray);
    line-height: 1.6;
    margin-bottom: 4px;
  }
  .content-item {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .content-item .item-number {
    font-size: 24px;
    font-weight: 700;
    color: var(--brand-blue);
    line-height: 1;
    flex-shrink: 0;
    width: 36px;
  }
  .content-item-body {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .content-item-body h4 {
    font-size: 16px;
    font-weight: 600;
    color: var(--brand-blue);
    line-height: 1.3;
  }
  .content-item-body p {
    font-size: 13px;
    color: var(--dark-gray);
    line-height: 1.5;
  }
  .tip-box {
    background-color: var(--light-bg);
    border-left: 3px solid var(--brand-blue);
    padding: 12px 16px;
    border-radius: 0 6px 6px 0;
  }
  .tip-box p {
    font-size: 14px;
    color: var(--dark-gray);
    line-height: 1.5;
  }
  .tip-box .tip-label {
    font-weight: 700;
    color: var(--brand-blue);
  }
</style>
</head>
<body>
  <div class="slide-header">
    <div class="slide-header-inner">
      <p>{{SECTION_TITLE}}</p>
      <p>{{PAGE_NUMBER}}</p>
    </div>
  </div>
  <div class="header-line"></div>
  <div class="slide-body">
    <div class="left-panel">
      <h2>{{LEFT_TITLE}}</h2>
      <p>{{LEFT_DESC}}</p>
    </div>
    <div class="vertical-divider"></div>
    <div class="right-panel">
      <p class="intro-text">{{RIGHT_INTRO}}</p>
      <div class="content-item">
        <p class="item-number">01</p>
        <div class="content-item-body">
          <h4>{{RIGHT_ITEM_1_TITLE}}</h4>
          <p>{{RIGHT_ITEM_1_BODY}}</p>
        </div>
      </div>
      <div class="content-item">
        <p class="item-number">02</p>
        <div class="content-item-body">
          <h4>{{RIGHT_ITEM_2_TITLE}}</h4>
          <p>{{RIGHT_ITEM_2_BODY}}</p>
        </div>
      </div>
      <div class="tip-box">
        <p><span class="tip-label">TIP</span>  {{TIP_TEXT}}</p>
      </div>
    </div>
  </div>
</body>
</html>
