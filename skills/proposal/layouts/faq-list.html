<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>FAQ List Slide</title>
<!--
  USAGE:
  FAQ 리스트. 큰 대제목 + 여러 개의 Q/A 아이템 (블루 ● + 블루 Q 제목 + 회색 A 본문).
  5개 내외의 질문/답변을 한 페이지에 밀도 있게 배치할 때 사용.

  구조:
  - 대제목 (예: "AI 업무 자동화 FAQ")
  - Q/A 아이템 5개 (블루 점 + 블루 질문 + 본문 답변)

  REPLACE:
  - {{SECTION_TITLE}}, {{PAGE_NUMBER}} : 헤더
  - {{MAIN_TITLE}} : 대제목
  - {{Q_N}} : 질문 (블루)
  - {{A_N}} : 답변 본문 (줄바꿈은 <br> 사용)

  FAQ 개수 조정: .qa-item 블록을 추가/삭제
-->
<style>
  :root {
    --brand-blue: #FF7E5F;
    --white: #FFFFFF;
    --light-bg: #F8F8F8;
    --black: #000000;
    --dark-gray: #333333;
    --font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-family);
    color: var(--dark-gray);
    background: var(--white);
    width: 960px;
    height: 540px;
    position: relative;
  }

  /* 헤더 */
  .slide-header { padding: 32px 60px 0 60px; }
  .slide-header-inner { display: flex; justify-content: space-between; align-items: center; }
  .slide-header p { font-size: 13px; font-weight: 500; color: var(--dark-gray); line-height: 1.4; }
  .header-line { height: 2px; background: var(--brand-blue); margin-top: 14px; }

  /* 메인 */
  .main {
    padding: 22px 60px 0 60px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .main-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--black);
    line-height: 1.2;
  }

  /* Q&A 리스트 */
  .qa-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .qa-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .qa-dot {
    flex: 0 0 8px;
    height: 8px;
    background: var(--brand-blue);
    border-radius: 50%;
    margin-top: 6px;
  }
  .qa-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .qa-content .question {
    font-size: 13px;
    font-weight: 700;
    color: var(--brand-blue);
    line-height: 1.3;
  }
  .qa-content .answer {
    font-size: 12px;
    color: var(--dark-gray);
    line-height: 1.55;
    padding-left: 2px;
  }

  /* 로고 */
  .logo-area { position: absolute; bottom: 20px; right: 60px; height: 12px; }
  .logo-area img { height: 100%; width: auto; }
</style>
</head>
<body>
  <div class="slide-header">
    <div class="slide-header-inner">
      <p>{{SECTION_TITLE}}</p>
      <p>{{PAGE_NUMBER}}</p>
    </div>
    <div class="header-line"></div>
  </div>

  <div class="main">
    <h1 class="main-title">{{MAIN_TITLE}}</h1>

    <div class="qa-list">
      <div class="qa-item">
        <div class="qa-dot"></div>
        <div class="qa-content">
          <p class="question">{{Q_1}}</p>
          <p class="answer">{{A_1}}</p>
        </div>
      </div>
      <div class="qa-item">
        <div class="qa-dot"></div>
        <div class="qa-content">
          <p class="question">{{Q_2}}</p>
          <p class="answer">{{A_2}}</p>
        </div>
      </div>
      <div class="qa-item">
        <div class="qa-dot"></div>
        <div class="qa-content">
          <p class="question">{{Q_3}}</p>
          <p class="answer">{{A_3}}</p>
        </div>
      </div>
      <div class="qa-item">
        <div class="qa-dot"></div>
        <div class="qa-content">
          <p class="question">{{Q_4}}</p>
          <p class="answer">{{A_4}}</p>
        </div>
      </div>
      <div class="qa-item">
        <div class="qa-dot"></div>
        <div class="qa-content">
          <p class="question">{{Q_5}}</p>
          <p class="answer">{{A_5}}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="logo-area">
    <img src="../assets/chatdaeri-logo.png" alt="CHATdaeri" style="height:18px;width:auto;display:block">
  </div>
</body>
</html>
