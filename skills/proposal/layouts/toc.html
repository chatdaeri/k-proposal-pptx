<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>Table of Contents Slide</title>
<link rel="stylesheet" href="../_shared.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    width: 960px;
    height: 540px;
    font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: var(--white);
    overflow: hidden;
    position: relative;
  }
  .slide-header { padding: 32px 60px 0 60px; }
  .slide-header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }
  .slide-header-inner p {
    font-size: 13px;
    color: var(--dark-gray);
    font-weight: 500;
    line-height: 1.4;
  }
  .header-line {
    margin: 14px 60px 0 60px;
    height: 2px;
    background: var(--brand-blue);
  }
  .slide-body {
    display: flex;
    padding: 24px 60px 40px 60px;
    gap: 60px;
    height: calc(100% - 66px);
  }
  .left-section {
    display: flex;
    align-items: flex-start;
    padding-top: 10px;
    flex-shrink: 0;
  }
  .left-section h1 {
    font-size: 52px;
    font-weight: 800;
    color: var(--brand-deep);
    line-height: 1.05;
    letter-spacing: -0.025em;
  }
  .right-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
  }
  .toc-item {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 20px 0;
  }
  .toc-item .toc-number {
    font-size: 28px;
    font-weight: 800;
    color: var(--brand-blue);
    line-height: 1;
    flex-shrink: 0;
    width: 40px;
    letter-spacing: -0.02em;
  }
  .toc-item-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .toc-item-text h3 {
    font-size: 18px;
    font-weight: 600;
    color: var(--black);
    line-height: 1.3;
  }
  .toc-item-text p {
    font-size: 13px;
    color: var(--dark-gray);
    line-height: 1.5;
  }
  .toc-divider {
    width: 100%;
    height: 1px;
    background-color: var(--light-border);
  }
</style>
</head>
<body>
  <div class="slide-header">
    <div class="slide-header-inner">
      <p>{{SECTION_TITLE}}</p>
      <p>{{PAGE_NUMBER}}</p>
    </div>
  </div>
  <div class="header-line"></div>
  <div class="slide-body">
    <div class="left-section">
      <h1>{{HERO_LABEL}}</h1>
    </div>
    <div class="right-section">
      <!-- BLOCK:toc_item BEGIN — 항목당 (toc-item + 다음 toc-divider) 한 쌍을 N회 복제. 마지막 항목 뒤 toc-divider 는 제거. -->
      <div class="toc-item">
        <p class="toc-number">{{ITEM_NUMBER}}</p>
        <div class="toc-item-text">
          <h3>{{ITEM_TITLE}}</h3>
          <p>{{ITEM_DESC}}</p>
        </div>
      </div>
      <div class="toc-divider"></div>
      <!-- BLOCK:toc_item END -->
    </div>
  </div>
</body>
</html>
