<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>Content — Hero Image (Top Band)</title>
<!--
  USAGE:
  이미지 1개가 상단 풀폭(16:9)으로 배치. 하단에 타이틀과 간단한 설명/포인트 2개.
  텍스트 블록이 ≤2개이고 이미지가 핵심 메시지일 때 사용.
  시선 흐름: 이미지 → 하단 타이틀 → 하단 좌→우 포인트.

  REPLACE:
  - {{SECTION_TITLE}}, {{PAGE_NUMBER}}
  - {{IMG_DESC}}
  - {{MAIN_TITLE}}, {{MAIN_SUB}}
  - {{POINT_1_TITLE}}, {{POINT_1_BODY}}
  - {{POINT_2_TITLE}}, {{POINT_2_BODY}}
-->
<link rel="stylesheet" href="../primitives/_shared.css">
<style>
.main {
  padding: 22px var(--pad-x) 50px var(--pad-x);
  display: flex;
  flex-direction: column;
  gap: 18px;
  height: calc(100% - var(--header-total));
}
.hero-img {
  width: 100%;
  height: 240px;
  background: var(--light-bg);
  border: 2px dashed var(--light-border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.hero-img p {
  font-size: 13px;
  color: var(--mid-gray);
  letter-spacing: 1px;
  text-align: center;
  line-height: 1.5;
}
.bottom-row {
  display: flex;
  gap: 30px;
  align-items: flex-start;
  flex: 1;
}
.title-col { flex: 0 0 300px; }
.title-col h1 { margin-bottom: 6px; }
.points-col {
  flex: 1;
  display: flex;
  gap: 24px;
}
.point {
  flex: 1;
  padding-top: 6px;
  border-top: 2px solid var(--brand-blue);
}
.point h4 {
  font-size: 13px;
  font-weight: 700;
  color: var(--brand-blue);
  margin-bottom: 4px;
}
.point p {
  font-size: 13px;
  color: var(--dark-gray);
  line-height: 1.55;
}
</style>
</head>
<body>
  <div class="slide-header">
    <div class="slide-header-inner">
      <p>{{SECTION_TITLE}}</p>
      <p>{{PAGE_NUMBER}}</p>
    </div>
    <div class="header-line"></div>
  </div>

  <div class="main">
    <div class="hero-img">
      <p>IMAGE (16:9)<br>{{IMG_DESC}}</p>
    </div>

    <div class="bottom-row">
      <div class="title-col">
        <h1 class="main-title">{{MAIN_TITLE}}</h1>
        <p class="main-sub">{{MAIN_SUB}}</p>
      </div>
      <div class="points-col">
        <div class="point">
          <h4>{{POINT_1_TITLE}}</h4>
          <p>{{POINT_1_BODY}}</p>
        </div>
        <div class="point">
          <h4>{{POINT_2_TITLE}}</h4>
          <p>{{POINT_2_BODY}}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="logo-area">
    <img src="../assets/logo.png" alt="CHATdaeri" style="height:18px;width:auto;display:block">
  </div>
</body>
</html>
