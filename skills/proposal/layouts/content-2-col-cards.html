<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=540">
<title>Content 2-Col Cards Slide</title>
<!--
  USAGE:
  2개 이미지 카드를 가로로 나열하는 레이아웃. 가장 자주 쓰이는 콘텐츠 구조.
  기사 비교, 방법 1/방법 2, Before/After, 2개 예시 등에 사용.

  구조:
  - 상단: 페이지 타이틀 + 부제목(선택)
  - 중앙: 2개 카드 (이미지 placeholder + 블루 타이틀 + 부제목 + 본문)

  REPLACE:
  - {{SECTION_TITLE}} : 헤더 섹션명
  - {{PAGE_NUMBER}} : 헤더 페이지 번호
  - {{MAIN_TITLE}} : 슬라이드 대제목
  - {{MAIN_SUB}} : 부제목/설명 (없으면 <p class="main-sub"> 제거)
  - {{CARD_N_IMG_DESC}} : 이미지 placeholder 안내
  - {{CARD_N_TITLE}} : 카드 블루 타이틀
  - {{CARD_N_SUBTITLE}} : 카드 부제목 (선택)
  - {{CARD_N_BODY}} : 카드 본문 텍스트
-->
<style>
  :root {
    --brand-blue: #FF7E5F;
    --white: #FFFFFF;
    --light-bg: #F8F8F8;
    --black: #000000;
    --dark-gray: #333333;
    --light-border: #E0E0E0;
    --font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-family);
    color: var(--dark-gray);
    background: var(--white);
    width: 960px;
    height: 540px;
    position: relative;
  }

  /* 헤더 */
  .slide-header { padding: 32px 60px 0 60px; }
  .slide-header-inner { display: flex; justify-content: space-between; align-items: center; }
  .slide-header p { font-size: 13px; font-weight: 500; color: var(--dark-gray); line-height: 1.4; }
  .header-line { height: 2px; background: var(--brand-blue); margin-top: 14px; }

  /* 메인 */
  .main {
    padding: 24px 60px 0 60px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .main-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--black);
    line-height: 1.2;
  }
  .main-sub {
    font-size: 14px;
    color: var(--dark-gray);
    line-height: 1.55;
    margin-top: -6px;
  }

  /* 2개 카드 */
  .cards {
    display: flex;
    gap: 24px;
    flex: 1;
  }
  .card {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card .img-ph {
    width: 100%;
    height: 180px;
    background: var(--light-bg);
    border: 2px dashed var(--light-border);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card .img-ph p {
    font-size: 12px;
    color: #bbb;
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.5;
  }
  .card h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--brand-blue);
    line-height: 1.3;
  }
  .card .card-subtitle {
    font-size: 14px;
    color: var(--dark-gray);
    font-weight: 600;
    margin-top: -4px;
  }
  .card p.body {
    font-size: 13px;
    color: var(--dark-gray);
    line-height: 1.55;
  }

  /* 로고 */
  .logo-area { position: absolute; bottom: 20px; right: 60px; height: 12px; }
  .logo-area img { height: 100%; width: auto; }
</style>
</head>
<body>
  <div class="slide-header">
    <div class="slide-header-inner">
      <p>{{SECTION_TITLE}}</p>
      <p>{{PAGE_NUMBER}}</p>
    </div>
    <div class="header-line"></div>
  </div>

  <div class="main">
    <h1 class="main-title">{{MAIN_TITLE}}</h1>
    <p class="main-sub">{{MAIN_SUB}}</p>

    <div class="cards">
      <div class="card">
        <div class="img-ph">
          <p>IMAGE<br>{{CARD_1_IMG_DESC}}</p>
        </div>
        <h3>{{CARD_1_TITLE}}</h3>
        <p class="card-subtitle">{{CARD_1_SUBTITLE}}</p>
        <p class="body">{{CARD_1_BODY}}</p>
      </div>
      <div class="card">
        <div class="img-ph">
          <p>IMAGE<br>{{CARD_2_IMG_DESC}}</p>
        </div>
        <h3>{{CARD_2_TITLE}}</h3>
        <p class="card-subtitle">{{CARD_2_SUBTITLE}}</p>
        <p class="body">{{CARD_2_BODY}}</p>
      </div>
    </div>
  </div>

  <div class="logo-area">
    <img src="../assets/chatdaeri-logo.png" alt="CHATdaeri" style="height:18px;width:auto;display:block">
  </div>
</body>
</html>
